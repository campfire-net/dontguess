name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        # -race is load-bearing: pkg/exchange dispatch, pkg/relay (intake/outbox/watchdog/conn)
        # and pkg/scrip run concurrent goroutines with shared state (M2 nostr surface).
        run: go test -race ./...

      - name: Build check
        run: go build ./cmd/dontguess

      - name: Vet
        run: go vet ./...
