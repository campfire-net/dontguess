name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Configure git for private repo access
        run: |
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"

      - name: Run tests
        env:
          GOPRIVATE: github.com/campfire-net/campfire
        run: go test ./...

      - name: Build check
        env:
          GOPRIVATE: github.com/campfire-net/campfire
        run: go build ./cmd/dontguess ./cmd/seller ./cmd/embed

      - name: Vet
        run: go vet ./...
